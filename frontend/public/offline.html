<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BackNine — Offline</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f1a15 0%, #1B3829 60%, #2D6A4F 100%);
      color: #fff; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .card { max-width: 320px; }
    .logo { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 14px; }
    .logo span { color: #4ade80; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.5; margin: 0 0 20px; }
    button {
      background: #4ade80; color: #0f1a15; border: 0; border-radius: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Back<span>Nine</span></div>
    <h1>You're offline</h1>
    <p>BackNine needs a connection to pull your latest health data. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
